  uses: "Slicing, fresh eating, sandwiches, salads"
  description: "Mortgage Lifter 'Radiator Charlie's' is one of the most legendary heirloom tomatoes in existence, developed by M.C. Byles in the 1930s through six years of patient cross-breeding without formal training. Byles—nicknamed 'Radiator Charlie' after his repair shop—sold seedlings for $1 each during the 1940s and famously paid off his $6,000 mortgage in six years, with gardeners traveling up to 200 miles to buy them. The enormous, slightly flattened pink-red fruits average 2½ lbs and can reach 4 lbs. Plants are highly productive, disease-resistant, and bear continuously until frost."
